name: Tailwind CSS

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-css:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Tailwind CSS
        run: npm run build:css

      - name: Anti-Bootstrap guard
        run: pwsh ./scripts/ci/check-no-bootstrap.ps1

      - name: CSS size budget
        run: pwsh ./scripts/ci/check-css-budget.ps1 -MaxWebKb 128 -MaxMobileKb 128

      - name: Verify generated CSS is committed
        run: git diff --exit-code -- src/Chop.Web/wwwroot/app.css src/Chop.App.Mobile/wwwroot/app.css
